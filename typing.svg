<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 50" width="620" height="50">
  <rect width="620" height="50" fill="#0d1117" rx="6"/>
  <style>
    .l {
      opacity: 0;
      animation: s 200s linear infinite;
      font-family: 'Courier New', Courier, monospace;
      text-anchor: middle;
    }
    @keyframes s {
      0%     { opacity: 0; }
      0.15%  { opacity: 1; }
      1.85%  { opacity: 1; }
      2%     { opacity: 0; }
      100%   { opacity: 0; }
    }
  </style>

  <!-- 01 · calm opener · gray · whisper -->
  <text class="l" x="310" y="32" style="animation-delay:0s;  fill:#777777;font-size:16px;font-weight:200">i build things.</text>

  <!-- 02 · softer gray · fades in -->
  <text class="l" x="310" y="32" style="animation-delay:4s;  fill:#666666;font-size:14px;font-weight:300">most of them are free.</text>

  <!-- 03 · green tint · opens up -->
  <text class="l" x="310" y="32" style="animation-delay:8s;  fill:#86efac;font-size:14px;font-weight:300">all of them are open.</text>

  <!-- 04 · near-invisible · the whisper -->
  <text class="l" x="310" y="32" style="animation-delay:12s; fill:#3d3d3d;font-size:11px;font-weight:200">quietly.</text>

  <!-- 05 · dim · understated -->
  <text class="l" x="310" y="32" style="animation-delay:16s; fill:#555555;font-size:12px;font-weight:200">no announcements.</text>

  <!-- 06 · green · sharp · short -->
  <text class="l" x="310" y="32" style="animation-delay:20s; fill:#4ade80;font-size:13px;font-weight:500">just commits.</text>

  <!-- 07 · WHITE · biggest · boldest · the peak -->
  <text class="l" x="310" y="34" style="animation-delay:24s; fill:#ffffff;font-size:22px;font-weight:700">the work speaks.</text>

  <!-- 08 · deflates · dry · small -->
  <text class="l" x="310" y="32" style="animation-delay:28s; fill:#4b4b4b;font-size:12px;font-weight:200">or it doesn't. either way.</text>

  <!-- 09 · green · punchy conviction -->
  <text class="l" x="310" y="32" style="animation-delay:32s; fill:#4ade80;font-size:14px;font-weight:500">open source or it didn't happen.</text>

  <!-- 10 · green · bold · slams in fast -->
  <text class="l" x="310" y="34" style="animation-delay:36s; fill:#4ade80;font-size:20px;font-weight:700">MIT. always.</text>

  <!-- 11 · soft green · rhythmic -->
  <text class="l" x="310" y="32" style="animation-delay:40s; fill:#86efac;font-size:13px;font-weight:400">fork it. audit it. own it.</text>

  <!-- 12 · teal · gentle truth -->
  <text class="l" x="310" y="32" style="animation-delay:44s; fill:#6ee7b7;font-size:14px;font-weight:300">the best software costs nothing.</text>

  <!-- 13 · green · solid line -->
  <text class="l" x="310" y="32" style="animation-delay:48s; fill:#4ade80;font-size:13px;font-weight:400">freedom isn't a feature. it's the foundation.</text>

  <!-- 14 · RED · accusation · breaks pattern -->
  <text class="l" x="310" y="32" style="animation-delay:52s; fill:#f87171;font-size:14px;font-weight:500">closed source is a trust issue.</text>

  <!-- 15 · green · calm after the red -->
  <text class="l" x="310" y="32" style="animation-delay:56s; fill:#4ade80;font-size:13px;font-weight:300">if you can read the code, you can trust it.</text>

  <!-- 16 · green · ultimatum energy -->
  <text class="l" x="310" y="32" style="animation-delay:60s; fill:#4ade80;font-size:15px;font-weight:600">build it free or don't build it.</text>

  <!-- 17 · amber · philosophical -->
  <text class="l" x="310" y="32" style="animation-delay:64s; fill:#fcd34d;font-size:13px;font-weight:300">your code outlives your intentions. make it open.</text>

  <!-- 18 · BLUE · new chapter · privacy begins -->
  <text class="l" x="310" y="32" style="animation-delay:68s; fill:#60a5fa;font-size:15px;font-weight:500">privacy is not a feature — it's the default.</text>

  <!-- 19 · blue · challenge -->
  <text class="l" x="310" y="32" style="animation-delay:72s; fill:#60a5fa;font-size:13px;font-weight:400">if it tracks you, there's a better version.</text>

  <!-- 20 · light blue · humble · quiet confidence -->
  <text class="l" x="310" y="32" style="animation-delay:76s; fill:#93c5fd;font-size:12px;font-weight:200">i'm probably building it.</text>

  <!-- 21 · blue · assertive · short -->
  <text class="l" x="310" y="32" style="animation-delay:80s; fill:#60a5fa;font-size:15px;font-weight:500">your data stays yours.</text>

  <!-- 22 · blue · three beats -->
  <text class="l" x="310" y="32" style="animation-delay:84s; fill:#7dd3fc;font-size:13px;font-weight:400">no tracking. no paywalls. no noise.</text>

  <!-- 23 · pale blue · big claim, quiet voice -->
  <text class="l" x="310" y="32" style="animation-delay:88s; fill:#93c5fd;font-size:14px;font-weight:300">the internet deserves better software.</text>

  <!-- 24 · blue · redefines paranoia -->
  <text class="l" x="310" y="32" style="animation-delay:92s; fill:#60a5fa;font-size:14px;font-weight:400">privacy is not paranoia. it's respect.</text>

  <!-- 25 · icy blue · personal truth -->
  <text class="l" x="310" y="32" style="animation-delay:96s; fill:#bae6fd;font-size:13px;font-weight:300">you shouldn't have to pay to be left alone.</text>

  <!-- 26 · soft red · line in the sand -->
  <text class="l" x="310" y="32" style="animation-delay:100s;fill:#fca5a5;font-size:13px;font-weight:500">surveillance is not a business model i accept.</text>

  <!-- 27 · PINK · personality shift · casual -->
  <text class="l" x="310" y="32" style="animation-delay:104s;fill:#f472b6;font-size:14px;font-weight:300">i code when i feel like it.</text>

  <!-- 28 · pink · rejecting corporate life -->
  <text class="l" x="310" y="32" style="animation-delay:108s;fill:#f9a8d4;font-size:13px;font-weight:300">no deadlines. no sprints. no standups.</text>

  <!-- 29 · AMBER · bold conviction -->
  <text class="l" x="310" y="32" style="animation-delay:112s;fill:#fb923c;font-size:15px;font-weight:600">skills over certificates. always.</text>

  <!-- 30 · amber · softer -->
  <text class="l" x="310" y="32" style="animation-delay:116s;fill:#fdba74;font-size:14px;font-weight:400">curiosity over credentials.</text>

  <!-- 31 · yellow · warm invitation -->
  <text class="l" x="310" y="32" style="animation-delay:120s;fill:#fde68a;font-size:14px;font-weight:300">learn because you want to.</text>

  <!-- 32 · dark amber · echoes · long pause after -->
  <text class="l" x="310" y="32" style="animation-delay:124s;fill:#92400e;font-size:13px;font-weight:200">not because you have to.</text>

  <!-- 33 · WHITE · second peak · punchy bold -->
  <text class="l" x="310" y="33" style="animation-delay:128s;fill:#ffffff;font-size:18px;font-weight:700">consistency beats intensity.</text>

  <!-- 34 · dim gray · dry · slightly ironic -->
  <text class="l" x="310" y="32" style="animation-delay:132s;fill:#6b7280;font-size:12px;font-weight:200">the best devs i know have no degree.</text>

  <!-- 35 · orange · observation -->
  <text class="l" x="310" y="32" style="animation-delay:136s;fill:#fb923c;font-size:13px;font-weight:300">there are better alternatives to most things.</text>

  <!-- 36 · amber · quiet call -->
  <text class="l" x="310" y="32" style="animation-delay:140s;fill:#f97316;font-size:14px;font-weight:400">someone has to build them.</text>

  <!-- 37 · green · shrug but confident -->
  <text class="l" x="310" y="33" style="animation-delay:144s;fill:#4ade80;font-size:17px;font-weight:500">might as well be free.</text>

  <!-- 38 · blue · the spec in three -->
  <text class="l" x="310" y="32" style="animation-delay:148s;fill:#7dd3fc;font-size:14px;font-weight:400">better UX. real privacy. zero cost.</text>

  <!-- 39 · gray · zen · quiet -->
  <text class="l" x="310" y="32" style="animation-delay:152s;fill:#9ca3af;font-size:13px;font-weight:200">good software is quiet. it just works.</text>

  <!-- 40 · amber · one rule -->
  <text class="l" x="310" y="32" style="animation-delay:156s;fill:#fbbf24;font-size:14px;font-weight:400">ship it when it's ready. not before.</text>

  <!-- 41 · orange · restless · never finished -->
  <text class="l" x="310" y="32" style="animation-delay:160s;fill:#f97316;font-size:14px;font-weight:400">i'm not done. i'm never done.</text>

  <!-- 42 · PURPLE · code as philosophy -->
  <text class="l" x="310" y="32" style="animation-delay:164s;fill:#a78bfa;font-size:14px;font-weight:400">hasPlan = false  //  intentional</text>

  <!-- 43 · purple · existential -->
  <text class="l" x="310" y="32" style="animation-delay:168s;fill:#c4b5fd;font-size:14px;font-weight:300">the future is unwritten. on purpose.</text>

  <!-- 44 · pale purple · vulnerable · honest -->
  <text class="l" x="310" y="32" style="animation-delay:172s;fill:#ddd6fe;font-size:13px;font-weight:200">i don't know what i'll build next.</text>

  <!-- 45 · purple · bold · punchline -->
  <text class="l" x="310" y="33" style="animation-delay:176s;fill:#a78bfa;font-size:17px;font-weight:600">that's the whole point.</text>

  <!-- 46 · deep purple · barely visible · poetic -->
  <text class="l" x="310" y="32" style="animation-delay:180s;fill:#6d28d9;font-size:12px;font-weight:200">somewhere between now and whatever comes next.</text>

  <!-- 47 · green · snaps back alive -->
  <text class="l" x="310" y="32" style="animation-delay:184s;fill:#4ade80;font-size:15px;font-weight:500">upgrading. always.</text>

  <!-- 48 · purple · the infinite version -->
  <text class="l" x="310" y="32" style="animation-delay:188s;fill:#8b5cf6;font-size:14px;font-weight:400">version = double.infinity</text>

  <!-- 49 · near invisible · for those who look -->
  <text class="l" x="310" y="32" style="animation-delay:192s;fill:#2d2d2d;font-size:11px;font-weight:200">if you know, you know.</text>

  <!-- 50 · white · large · the signature · long breath -->
  <text class="l" x="310" y="33" style="animation-delay:196s;fill:#eeeeee;font-size:19px;font-weight:200">— frkudn</text>
</svg>
