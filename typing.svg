  <text class="t" x="340" y="31" style="animation:k0 320.0s linear infinite">i build things.</text>
  <text class="t" x="340" y="31" style="animation:k1 320.0s linear infinite">most of them are free.</text>
  <text class="t" x="340" y="31" style="animation:k2 320.0s linear infinite">all of them are open.</text>
  <text class="t" x="340" y="31" style="animation:k3 320.0s linear infinite">quietly.</text>
  <text class="t" x="340" y="31" style="animation:k4 320.0s linear infinite">no announcements.</text>
  <text class="t" x="340" y="31" style="animation:k5 320.0s linear infinite">just commits.</text>
  <text class="t" x="340" y="31" style="animation:k6 320.0s linear infinite">the work speaks.</text>
  <text class="t" x="340" y="31" style="animation:k7 320.0s linear infinite">or it doesn't. either way.</text>
  <text class="t" x="340" y="31" style="animation:k8 320.0s linear infinite">free doesn't mean cheap.</text>
  <text class="t" x="340" y="31" style="animation:k9 320.0s linear infinite">it means the builder didn't need your money to care.</text>
  <text class="t" x="340" y="31" style="animation:k10 320.0s linear infinite">free software is not a discount. it's a decision.</text>
  <text class="t" x="340" y="31" style="animation:k11 320.0s linear infinite">open source is not a charity. it's a standard.</text>
  <text class="t" x="340" y="31" style="animation:k12 320.0s linear infinite">you paid nothing. that doesn't mean it cost nothing.</text>
  <text class="t" x="340" y="31" style="animation:k13 320.0s linear infinite">passion ships faster than deadlines.</text>
  <text class="t" x="340" y="31" style="animation:k14 320.0s linear infinite">i build it because i want to. not because i'm paid to.</text>
  <text class="t" x="340" y="31" style="animation:k15 320.0s linear infinite">the best things don't have a price tag. some are on github.</text>
  <text class="t" x="340" y="31" style="animation:k16 320.0s linear infinite">your search history doesn't belong to mountain view.</text>
  <text class="t" x="340" y="31" style="animation:k17 320.0s linear infinite">your messages don't belong to menlo park.</text>
  <text class="t" x="340" y="31" style="animation:k18 320.0s linear infinite">your files don't belong to seattle.</text>
  <text class="t" x="340" y="31" style="animation:k19 320.0s linear infinite">your attention doesn't belong to anyone.</text>
  <text class="t" x="340" y="31" style="animation:k20 320.0s linear infinite">we outsourced the internet to four companies.</text>
  <text class="t" x="340" y="31" style="animation:k21 320.0s linear infinite">that was a mistake.</text>
  <text class="t" x="340" y="31" style="animation:k22 320.0s linear infinite">we can take it back.</text>
  <text class="t" x="340" y="31" style="animation:k23 320.0s linear infinite">one repo at a time.</text>
  <text class="t" x="340" y="31" style="animation:k24 320.0s linear infinite">no vc. no board. no permission.</text>
  <text class="t" x="340" y="31" style="animation:k25 320.0s linear infinite">the internet was supposed to be ours.</text>
  <text class="t" x="340" y="31" style="animation:k26 320.0s linear infinite">somewhere it stopped being.</text>
  <text class="t" x="340" y="31" style="animation:k27 320.0s linear infinite">we're building it back.</text>
  <text class="t" x="340" y="31" style="animation:k28 320.0s linear infinite">decentralized. open. free.</text>
  <text class="t" x="340" y="31" style="animation:k29 320.0s linear infinite">not google's. not meta's. not amazon's.</text>
  <text class="t" x="340" y="31" style="animation:k30 320.0s linear infinite">ours.</text>
  <text class="t" x="340" y="31" style="animation:k31 320.0s linear infinite">what if we just built our own?</text>
  <text class="t" x="340" y="31" style="animation:k32 320.0s linear infinite">our own tools. our own stack. our own rules.</text>
  <text class="t" x="340" y="31" style="animation:k33 320.0s linear infinite">not waiting for permission.</text>
  <text class="t" x="340" y="31" style="animation:k34 320.0s linear infinite">not waiting for funding.</text>
  <text class="t" x="340" y="31" style="animation:k35 320.0s linear infinite">just building.</text>
  <text class="t" x="340" y="31" style="animation:k36 320.0s linear infinite">MIT licensed. forever.</text>
  <text class="t" x="340" y="31" style="animation:k37 320.0s linear infinite">fork it. make it yours.</text>
  <text class="t" x="340" y="31" style="animation:k38 320.0s linear infinite">privacy is not a feature. it's the default.</text>
  <text class="t" x="340" y="31" style="animation:k39 320.0s linear infinite">if it tracks you, there's a better version.</text>
  <text class="t" x="340" y="31" style="animation:k40 320.0s linear infinite">i'm probably building it.</text>
  <text class="t" x="340" y="31" style="animation:k41 320.0s linear infinite">your data stays yours.</text>
  <text class="t" x="340" y="31" style="animation:k42 320.0s linear infinite">no tracking. no paywalls. no noise.</text>
  <text class="t" x="340" y="31" style="animation:k43 320.0s linear infinite">you shouldn't have to pay to be left alone.</text>
  <text class="t" x="340" y="31" style="animation:k44 320.0s linear infinite">surveillance is not a business model i accept.</text>
  <text class="t" x="340" y="31" style="animation:k45 320.0s linear infinite">closed source is a trust issue.</text>
  <text class="t" x="340" y="31" style="animation:k46 320.0s linear infinite">if you can read the code, you can trust it.</text>
  <text class="t" x="340" y="31" style="animation:k47 320.0s linear infinite">skills over certificates. always.</text>
  <text class="t" x="340" y="31" style="animation:k48 320.0s linear infinite">curiosity over credentials.</text>
  <text class="t" x="340" y="31" style="animation:k49 320.0s linear infinite">i code when i feel like it.</text>
  <text class="t" x="340" y="31" style="animation:k50 320.0s linear infinite">no deadlines. no sprints. no standups.</text>
  <text class="t" x="340" y="31" style="animation:k51 320.0s linear infinite">consistency beats intensity.</text>
  <text class="t" x="340" y="31" style="animation:k52 320.0s linear infinite">the best devs i know have no degree.</text>
  <text class="t" x="340" y="31" style="animation:k53 320.0s linear infinite">learn because you want to. not because you have to.</text>
  <text class="t" x="340" y="31" style="animation:k54 320.0s linear infinite">good software is quiet. it just works.</text>
  <text class="t" x="340" y="31" style="animation:k55 320.0s linear infinite">open source or it didn't happen.</text>
  <text class="t" x="340" y="31" style="animation:k56 320.0s linear infinite">MIT. always.</text>
  <text class="t" x="340" y="31" style="animation:k57 320.0s linear infinite">freedom isn't a feature. it's the foundation.</text>
  <text class="t" x="340" y="31" style="animation:k58 320.0s linear infinite">build it free or don't build it.</text>
  <text class="t" x="340" y="31" style="animation:k59 320.0s linear infinite">the best software costs nothing.</text>
  <text class="t" x="340" y="31" style="animation:k60 320.0s linear infinite">your code outlives your intentions. make it open.</text>
  <text class="t" x="340" y="31" style="animation:k61 320.0s linear infinite">fork it. audit it. own it.</text>
  <text class="t" x="340" y="31" style="animation:k62 320.0s linear infinite">build in the open. die in the open.</text>
  <text class="t" x="340" y="31" style="animation:k63 320.0s linear infinite">hasPlan = false  //  intentional</text>
  <text class="t" x="340" y="31" style="animation:k64 320.0s linear infinite">the future is unwritten. on purpose.</text>
  <text class="t" x="340" y="31" style="animation:k65 320.0s linear infinite">i don't know what i'll build next.</text>
  <text class="t" x="340" y="31" style="animation:k66 320.0s linear infinite">that's the whole point.</text>
  <text class="t" x="340" y="31" style="animation:k67 320.0s linear infinite">version = double.infinity</text>
  <text class="t" x="340" y="31" style="animation:k68 320.0s linear infinite">still compiling.</text>
  <text class="t" x="340" y="31" style="animation:k69 320.0s linear infinite">upgrading. always.</text>
  <text class="t" x="340" y="31" style="animation:k70 320.0s linear infinite">somewhere between now and whatever comes next.</text>
  <text class="t" x="340" y="31" style="animation:k71 320.0s linear infinite">there are better alternatives to most things.</text>
  <text class="t" x="340" y="31" style="animation:k72 320.0s linear infinite">someone has to build them.</text>
  <text class="t" x="340" y="31" style="animation:k73 320.0s linear infinite">might as well be free.</text>
  <text class="t" x="340" y="31" style="animation:k74 320.0s linear infinite">might as well be open.</text>
  <text class="t" x="340" y="31" style="animation:k75 320.0s linear infinite">might as well be us.</text>
  <text class="t" x="340" y="31" style="animation:k76 320.0s linear infinite">the internet deserves better software.</text>
  <text class="t" x="340" y="31" style="animation:k77 320.0s linear infinite">i'm working on it.</text>
  <text class="t" x="340" y="31" style="animation:k78 320.0s linear infinite">if you know, you know.</text>
  <text class="t" x="340" y="31" style="animation:k79 320.0s linear infinite">— frkudn</text>
</svg>
